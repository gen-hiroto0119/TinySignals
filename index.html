<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TinyReactive Counter</title>
    <style>
      :root {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f7fb;
      }

      .counter {
        width: min(420px, calc(100vw - 2rem));
        padding: 1rem;
        border-radius: 12px;
        background: #ffffff;
        box-shadow: 0 12px 40px rgba(11, 25, 56, 0.1);
      }

      .counter h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
      }

      .counter p {
        margin: 0 0 0.75rem;
        font-size: 2rem;
      }

      .counter button {
        margin-right: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/examples/counter.tsx"></script>
  </body>
</html>
